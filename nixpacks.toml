providers = ["node"]

[phases.setup]
# Ensure pnpm is available (root package.json uses "packageManager": "pnpm@9.1.0").
cmds = ["corepack enable", "corepack prepare pnpm@9.1.0 --activate"]

[phases.install]
# Ensure devDependencies are present so `tsc` is available during build.
cmds = ["pnpm install --frozen-lockfile --prod=false"]

[phases.build]
# The backend uses TypeScript project references to build its workspace dependencies.
cmds = ["pnpm --filter @camino/backend build"]

[start]
cmd = "pnpm --filter @camino/backend start"
